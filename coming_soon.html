<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image en grand</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .image-container {
      max-width: 90%;
      max-height: 90%;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>

  <div class="image-container">
    <img src="../GRAPH/comingsoon.png" alt="Image en grand">
  </div>

</body>
</html>
